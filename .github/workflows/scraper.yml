name: Vinyl Scraper Automation

on:
 # Run every hour from 5 AM to 11 PM UTC
 schedule:
  - cron: "0 5-23 * * *"

 # Allow manual trigger from GitHub Actions tab
 workflow_dispatch:

jobs:
 scrape:
  runs-on: ubuntu-latest
  timeout-minutes: 5
  permissions:
   contents: write

  steps:
   - name: Checkout repository
     uses: actions/checkout@v6
     with:
      token: ${{ secrets.GITHUB_TOKEN }}
      persist-credentials: true

   - name: Setup Node.js
     uses: actions/setup-node@v6
     with:
      node-version: "24"
      cache: "npm"

   - name: Install dependencies
     run: npm ci

   - name: Run scraper
     run: npm run scrape
     env:
      NODE_ENV: production

   - name: Configure Git
     run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

   - name: Commit and push database changes
     run: |
      git add data/vinyls.db

      # Check if there are changes to commit
      if git diff --staged --quiet; then
        echo "No changes to database, skipping commit"
      else
        git commit -m "Auto-update: Scraped vinyl records ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
        git push
      fi
